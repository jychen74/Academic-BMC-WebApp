<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      body { font-family: "微軟正黑體", sans-serif; background: #f4f4f9; padding: 20px; }
      
      .tab { overflow: hidden; border-bottom: 2px solid #ccc; margin-bottom: 15px; }
      .tab button { background-color: inherit; float: left; border: none; outline: none; cursor: pointer; padding: 14px 24px; font-size: 18px; font-weight: bold; border-radius: 8px 8px 0 0; color: #666; }
      .tab button:hover { background-color: #ddd; }
      .tab button.active { background-color: #007bff; color: white; }
      .tabcontent { display: none; }

      .export-bar { background: #e9ecef; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
      .export-bar button { padding: 8px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: white; font-weight: bold; color: #333;}
      .export-bar button:hover { background: #d4edda; border-color: #28a745;}
      .btn-sponsor { background: #FFDD00 !important; border-color: #f6c800 !important; }

      .bmc-grid { display: grid; grid-template-columns: repeat(10, 1fr); grid-auto-rows: minmax(150px, auto); gap: 15px; max-width: 1400px; margin: 0 auto; }
      .swot-grid { display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: minmax(250px, auto); gap: 20px; max-width: 1000px; margin: 0 auto; }
      
      .box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column;}
      h3 { margin-top: 0; color: #333; font-size: 16px; border-bottom: 2px solid #007bff; padding-bottom: 5px;}
      .content { flex-grow: 1; outline: none; white-space: pre-wrap; line-height: 1.5; font-size: 15px;}
      .content:focus { background: #fffde7; }
      #status { position: fixed; bottom: 20px; right: 20px; background: #4CAF50; color: white; padding: 10px; border-radius: 5px; display: none; z-index: 1000;}

      #box-kp { grid-column: 1 / 3; grid-row: 1 / 3; } #box-ka { grid-column: 3 / 5; grid-row: 1 / 2; }
      #box-kr { grid-column: 3 / 5; grid-row: 2 / 3; } #box-vp { grid-column: 5 / 7; grid-row: 1 / 3; }
      #box-cr { grid-column: 7 / 9; grid-row: 1 / 2; } #box-ch { grid-column: 7 / 9; grid-row: 2 / 3; }
      #box-cs { grid-column: 9 / 11; grid-row: 1 / 3; }
      #box-cs_cost { grid-column: 1 / 6; grid-row: 3 / 4; min-height: 120px; }
      #box-rs { grid-column: 6 / 11; grid-row: 3 / 4; min-height: 120px; }
      #box-swot_s h3 { border-color: #28a745; color: #28a745; } #box-swot_w h3 { border-color: #dc3545; color: #dc3545; }
      #box-swot_o h3 { border-color: #17a2b8; color: #17a2b8; } #box-swot_t h3 { border-color: #ffc107; color: #d39e00; }

      @media print {
        body { background: white; padding: 0; }
        .tab, .export-bar, #status { display: none !important; }
        .box { box-shadow: none; border: 2px solid #000; break-inside: avoid;}
        .bmc-grid, .swot-grid { display: grid !important; gap: 10px; }
      }
    </style>
  </head>
  <body>

    <div class="tab">
      <button class="tablinks active" onclick="openTab(event, 'Tab_BMC')">商業模式畫布 (BMC)</button>
      <button class="tablinks" onclick="openTab(event, 'Tab_SWOT')">SWOT 分析</button>
    </div>

    <div class="export-bar">
      <span>🛠️ 匯出與工具：</span>
      <button onclick="window.print()">🖨️ 存為 PDF</button>
      <button onclick="downloadLocal('png')">🖼️ 下載圖檔</button>
      <button onclick="downloadLocal('qmd')">📄 下載 Quarto (.qmd)</button>
      <button onclick="nativeShare()">🔗 分享與發送</button>
      <button class="btn-sponsor" onclick="window.open('https://ko-fi.com/jingyuanchen', '_blank')">☕ 贊助開發者</button>
    </div>

    <div id="status">提示訊息區</div>

    <div id="Tab_BMC" class="tabcontent" style="display: block;">
      <div class="bmc-grid" id="bmc-container">資料載入中...</div>
    </div>

    <div id="Tab_SWOT" class="tabcontent">
      <div class="swot-grid" id="swot-container">資料載入中...</div>
    </div>

    <script>
      google.script.run.withSuccessHandler(renderCanvas).getBmcData();

      function renderCanvas(data) {
        let bmcHtml = "";
        ['kp', 'ka', 'kr', 'vp', 'cr', 'ch', 'cs', 'cs_cost', 'rs'].forEach(id => {
           const title = data[id] ? data[id].title : id;
           const content = data[id] ? data[id].content : '';
           bmcHtml += `<div class="box" id="box-${id}"><h3>${title}</h3><div class="content" contenteditable="true" data-id="${id}" onblur="saveData(this)">${content}</div></div>`;
        });
        document.getElementById('bmc-container').innerHTML = bmcHtml;

        let swotHtml = "";
        ['swot_s', 'swot_w', 'swot_o', 'swot_t'].forEach(id => {
           const title = data[id] ? data[id].title : id;
           const content = data[id] ? data[id].content : '';
           swotHtml += `<div class="box" id="box-${id}"><h3>${title}</h3><div class="content" contenteditable="true" data-id="${id}" onblur="saveData(this)">${content}</div></div>`;
        });
        document.getElementById('swot-container').innerHTML = swotHtml;
      }

      function saveData(element) {
        const id = element.getAttribute('data-id');
        const text = element.innerText;
        showStatus('存檔中...', true);
        google.script.run.withSuccessHandler(() => showStatus('已自動存檔！')).saveBmcData(id, text);
      }

      function openTab(evt, tabName) {
        document.querySelectorAll(".tabcontent").forEach(el => el.style.display = "none");
        document.querySelectorAll(".tablinks").forEach(el => el.className = el.className.replace(" active", ""));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
      }

      function showStatus(msg, keep = false) {
        const el = document.getElementById('status');
        el.innerText = msg;
        el.style.display = 'block';
        if (!keep) setTimeout(() => el.style.display = 'none', 3000);
      }

      function generateQMDString() {
        let qmd = "---\ntitle: \"策略分析畫布\"\nauthor: \"Generated by Canvas Web App\"\nformat: revealjs\n---\n\n";
        qmd += "## 商業模式畫布 (BMC)\n\n";
        ['kp', 'ka', 'kr', 'vp', 'cr', 'ch', 'cs', 'cs_cost', 'rs'].forEach(id => {
          const title = document.querySelector(`#box-${id} h3`).innerText;
          const content = document.querySelector(`.content[data-id="${id}"]`).innerText;
          qmd += `### ${title}\n${content}\n\n`;
        });
        qmd += "---\n\n## SWOT 分析\n\n";
        ['swot_s', 'swot_w', 'swot_o', 'swot_t'].forEach(id => {
          const title = document.querySelector(`#box-${id} h3`).innerText;
          const content = document.querySelector(`.content[data-id="${id}"]`).innerText;
          qmd += `### ${title}\n${content}\n\n`;
        });
        return qmd;
      }

      function downloadLocal(type) {
        if (type === 'qmd') {
          const blob = new Blob([generateQMDString()], {type: "text/plain;charset=utf-8"});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'My_Strategy.qmd';
          a.click();
        } else if (type === 'png') {
          showStatus('正在生成圖檔...', true);
          const activeTab = document.querySelector('.tabcontent[style*="block"] > div');
          const currentTabName = activeTab.id === 'bmc-container' ? 'BMC' : 'SWOT';
          html2canvas(activeTab).then(canvas => {
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `${currentTabName}_Analysis.png`;
            a.click();
            showStatus('圖檔下載完成！');
          });
        }
      }

      async function nativeShare() {
        const qmdText = generateQMDString();
        const activeTab = document.querySelector('.tabcontent[style*="block"] > div');
        const currentTabName = activeTab.id === 'bmc-container' ? 'BMC' : 'SWOT';
        const shareTitle = `策略分析匯出 (${currentTabName})`;

        if (navigator.share) {
          try {
            await navigator.share({ title: shareTitle, text: qmdText });
            showStatus('分享成功！');
          } catch (error) {
            showStatus('已取消分享', true);
            setTimeout(() => document.getElementById('status').style.display = 'none', 2000);
          }
        } else {
          const subject = encodeURIComponent(shareTitle);
          const body = encodeURIComponent(qmdText);
          window.location.href = `mailto:?subject=${subject}&body=${body}`;
          showStatus('已開啟預設信箱軟體');
        }
      }
    </script>
  </body>
</html>
